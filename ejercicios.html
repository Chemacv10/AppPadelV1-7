<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Ejercicios — Escuela de Pádel</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .nuevo-inline{display:flex;gap:6px;align-items:center;margin:-4px 0 8px;animation:fadeIn .15s ease}
    .nuevo-inline .finp{flex:1}
    .nuevo-inline .sbtn{padding:9px 12px;min-width:0;flex-shrink:0}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    .filtros-wrap{display:flex;gap:8px;margin-bottom:10px}
    .filtros-wrap > div{flex:1}
  </style>
</head>
<body>
<div class="page">
  <div id="header-container"></div>
  <nav id="nav-container"></nav>

  <main class="content">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="buscador" placeholder="Buscar ejercicio..." oninput="filtrar()">
    </div>

    <div class="filtros-wrap">
      <div>
        <div class="filter-label">Categoría</div>
        <select class="fsel" id="filtro-cat" onchange="filtrar()">
          <option value="">Todas</option>
          <option>Calentamiento</option>
          <option>Carritos</option>
          <option>Situaciones</option>
          <option>Partiditos</option>
          <option>Genérico</option>
        </select>
      </div>
      <div>
        <div class="filter-label">Nivel</div>
        <select class="fsel" id="filtro-niv" onchange="filtrar()">
          <option value="">Todos</option>
        </select>
      </div>
    </div>

    <div class="sec">
      <img src="icons/ejercicios.png">
      <div class="sec-title">Ejercicios</div>
      <div class="sec-count" id="contador">—</div>
    </div>

    <div id="lista-ejercicios"><div class="loading"><div class="spinner"></div></div></div>
  </main>

  <button class="fab" onclick="abrirNuevo()">+</button>

  <!-- Sheet ejercicio -->
  <div class="overlay" id="sh-ej">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="sh-titulo">Nuevo ejercicio</div>
      <input type="hidden" id="ej-id">

      <div class="fgrp">
        <div class="flbl">Nombre</div>
        <input class="finp" id="ej-nombre" placeholder="Nombre del ejercicio">
      </div>

      <div class="frow">
        <div class="fgrp">
          <div class="flbl">Categoría</div>
          <select class="fsel" id="ej-cat">
            <option>Calentamiento</option>
            <option>Carritos</option>
            <option>Situaciones</option>
            <option>Partiditos</option>
            <option>Genérico</option>
          </select>
        </div>
        <div class="fgrp">
          <div class="flbl">Tipo</div>
          <select class="fsel" id="ej-tipo" onchange="onSelectNuevoTipo(this)"></select>
        </div>
      </div>
      <div class="nuevo-inline" id="nuevo-tipo-wrap" style="display:none">
        <input class="finp" id="nuevo-tipo-inp" placeholder="Ej: Globo"
          onkeydown="if(event.key==='Enter'){event.preventDefault();confirmarNuevoTipo();}">
        <button class="sbtn prim" type="button" onclick="confirmarNuevoTipo()">✓</button>
        <button class="sbtn" type="button" onclick="cancelarNuevoTipo()">✕</button>
      </div>

      <div class="frow">
        <div class="fgrp">
          <div class="flbl">Nivel</div>
          <select class="fsel" id="ej-nivel" onchange="onSelectNuevoNivel(this)"></select>
        </div>
        <div class="fgrp">
          <div class="flbl">Duración</div>
          <select class="fsel" id="ej-dur">
            <option value="">— Sin especificar —</option>
            <option>5 min</option><option>10 min</option>
            <option selected>15 min</option><option>20 min</option>
            <option>25 min</option><option>30 min</option>
            <option>45 min</option><option>60 min</option>
          </select>
        </div>
      </div>
      <div class="nuevo-inline" id="nuevo-nivel-wrap" style="display:none">
        <input class="finp" id="nuevo-nivel-inp" placeholder="Ej: Competición"
          onkeydown="if(event.key==='Enter'){event.preventDefault();confirmarNuevoNivel();}">
        <button class="sbtn prim" type="button" onclick="confirmarNuevoNivel()">✓</button>
        <button class="sbtn" type="button" onclick="cancelarNuevoNivel()">✕</button>
      </div>

      <div class="fgrp">
        <div class="flbl">Material</div>
        <input class="finp" id="ej-mat" placeholder="Ej: Pelotas, Conos">
      </div>
      <div class="fgrp">
        <div class="flbl">Descripción</div>
        <textarea class="finp" id="ej-desc" placeholder="Describe el ejercicio..." rows="3" style="resize:none;line-height:1.5"></textarea>
      </div>
      <div class="fgrp">
        <div class="flbl">Vídeo YouTube (URL)</div>
        <input class="finp" id="ej-video" placeholder="https://youtube.com/...">
      </div>

      <div class="sheet-btns">
        <button class="sbtn" onclick="closeSheet('sh-ej')">Cancelar</button>
        <button class="sbtn prim" onclick="guardar()">✓ Guardar</button>
      </div>
    </div>
  </div>

  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <div class="confirm-titulo">¿Eliminar ejercicio?</div>
      <div class="confirm-texto" id="confirm-texto"></div>
      <div class="confirm-btns">
        <button class="cbtn" onclick="document.getElementById('confirm-overlay').classList.remove('open')">Cancelar</button>
        <button class="cbtn danger" id="confirm-ok">Eliminar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script>
let _ejercicios  = [];
let _cfgNiveles  = ['Principiante','Intermedio','Avanzado'];
let _cfgTipos    = ['Ataque','Defensa','Volea','Saque','Resto','Remate','Globo','Táctica','Físico','Técnica básica'];

const ICONO_CAT = {
  'Calentamiento':'icons/calentamiento.png',
  'Carritos':     'icons/carritos.png',
  'Situaciones':  'icons/situaciones.png',
  'Partiditos':   'icons/partiditos.png',
  'Genérico':     'icons/generico.png',
};

// ── Filtros ────────────────────────────────────
function filtrar() {
  const q   = (document.getElementById('buscador').value || '').toLowerCase().trim();
  const cat = document.getElementById('filtro-cat').value;
  const niv = document.getElementById('filtro-niv').value;
  const lista = _ejercicios.filter(e => {
    if (cat && e.categoria !== cat) return false;
    if (niv && e.nivel !== niv && e.nivel) return false;
    if (e.activo === false) return false;
    if (!q) return true;
    return [e.nombre, e.categoria, e.tipo, e.nivel, e.descripcion].filter(Boolean).join(' ').toLowerCase().includes(q);
  });
  renderLista(lista);
}

// ── Render ─────────────────────────────────────
function renderLista(lista) {
  document.getElementById('contador').textContent = lista.length;
  const el = document.getElementById('lista-ejercicios');
  if (!lista.length) { showEmpty('lista-ejercicios','Sin ejercicios con ese filtro'); return; }
  el.innerHTML = lista.map(e => {
    const tags = [
      e.categoria ? `<span class="etag">📂 ${e.categoria}</span>` : '',
      e.tipo      ? `<span class="etag">🎯 ${e.tipo}</span>`      : '',
      e.duracion  ? `<span class="etag">⏱ ${e.duracion}</span>`  : '',
      e.material  ? `<span class="etag">📦 ${e.material}</span>`  : '',
    ].join('');
    return `
    <div class="card" id="card-${e.id}">
      <div class="card-main" onclick="toggleCard('${e.id}')">
        <div class="av-ico"><img src="${ICONO_CAT[e.categoria]||'icons/ejercicios.png'}"></div>
        <div class="ci">
          <div class="cn">${e.nombre}</div>
          <div class="cm">
            <span class="chip cgr">${e.categoria||'Sin categoría'}</span>
            ${e.nivel ? chipNivel(e.nivel) : ''}
            ${e.duracion ? `<span style="font-size:10px;color:var(--sutil);font-weight:600">· ${e.duracion}</span>` : ''}
          </div>
        </div>
        <div class="chev" id="chev-${e.id}">▼</div>
      </div>
      <div class="exp" id="exp-${e.id}">
        <div class="etags">${tags}</div>
        ${e.descripcion ? `<div class="edesc">${e.descripcion}</div>` : ''}
        <div class="euso">⏱ ${e.usos ? e.usos+' usos' : 'Nunca usado'}</div>
        ${e.video_url ? `<a href="${e.video_url}" target="_blank" class="abtn" style="font-size:11px;color:#e05a5a;text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-top:2px">▶ Ver vídeo en YouTube</a>` : ''}
        <div class="abtns">
          <button class="abtn prim" onclick="abrirEditarId('${e.id}')">✏️ Editar</button>
          <button class="abtn dang" onclick="confirmarEliminar('${e.id}','${e.nombre.replace(/'/g,"\'")}')">🗑 Eliminar</button>
          <button class="abtn warn" onclick="noUsar('${e.id}')">🚫 No usar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Tipo dinámico ──────────────────────────────
function fillTipoSelect(valorActual) {
  const sel = document.getElementById('ej-tipo');
  sel.innerHTML = '<option value="">— Sin tipo —</option>' +
    _cfgTipos.map(t => `<option value="${t}">${t}</option>`).join('') +
    '<option value="__nuevo__">+ Añadir tipo…</option>';
  if (valorActual) sel.value = valorActual;
}

function onSelectNuevoTipo(sel) {
  if (sel.value !== '__nuevo__') return;
  sel.value = '';
  document.getElementById('nuevo-tipo-wrap').style.display = 'flex';
  document.getElementById('nuevo-tipo-inp').value = '';
  document.getElementById('nuevo-tipo-inp').focus();
}

function confirmarNuevoTipo() {
  const inp = document.getElementById('nuevo-tipo-inp');
  const val = inp.value.trim();
  if (!val) { inp.focus(); return; }
  if (!_cfgTipos.includes(val)) {
    _cfgTipos.push(val);
    saveConfig('tipos', _cfgTipos).catch(console.error);
  }
  fillTipoSelect(val);
  cancelarNuevoTipo();
  toast('✓ Tipo "' + val + '" añadido', 'ok');
}
function cancelarNuevoTipo() {
  document.getElementById('nuevo-tipo-wrap').style.display = 'none';
}

// ── Nivel dinámico ─────────────────────────────
function fillNivelSelect(valorActual) {
  const sel = document.getElementById('ej-nivel');
  sel.innerHTML = '<option value="">Todos los niveles</option>' +
    _cfgNiveles.map(n => `<option value="${n}">${n}</option>`).join('') +
    '<option value="__nuevo__">+ Añadir nivel…</option>';
  if (valorActual) sel.value = valorActual;
}

function fillFiltroNivel() {
  const sel = document.getElementById('filtro-niv');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todos</option>' +
    _cfgNiveles.map(n => `<option value="${n}">${n}</option>`).join('');
  if (cur) sel.value = cur;
}

function onSelectNuevoNivel(sel) {
  if (sel.value !== '__nuevo__') return;
  sel.value = '';
  document.getElementById('nuevo-nivel-wrap').style.display = 'flex';
  document.getElementById('nuevo-nivel-inp').value = '';
  document.getElementById('nuevo-nivel-inp').focus();
}

function confirmarNuevoNivel() {
  const inp = document.getElementById('nuevo-nivel-inp');
  const val = inp.value.trim();
  if (!val) { inp.focus(); return; }
  if (!_cfgNiveles.includes(val)) {
    _cfgNiveles.push(val);
    saveConfig('niveles', _cfgNiveles).catch(console.error);
    fillFiltroNivel();
  }
  fillNivelSelect(val);
  cancelarNuevoNivel();
  toast('✓ Nivel "' + val + '" añadido', 'ok');
}
function cancelarNuevoNivel() {
  document.getElementById('nuevo-nivel-wrap').style.display = 'none';
}

// ── CRUD ───────────────────────────────────────
function abrirNuevo() {
  document.getElementById('sh-titulo').textContent = 'Nuevo ejercicio';
  ['ej-id','ej-nombre','ej-mat','ej-desc','ej-video'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('ej-dur').value = '15 min';
  document.getElementById('ej-cat').value = 'Calentamiento';
  fillTipoSelect('');
  fillNivelSelect('');
  openSheet('sh-ej');
}

function abrirEditarId(id) {
  const e = _ejercicios.find(x => x.id === id);
  if (e) abrirEditar(e);
}

function abrirEditar(e) {
  document.getElementById('sh-titulo').textContent = 'Editar ejercicio';
  document.getElementById('ej-id').value      = e.id;
  document.getElementById('ej-nombre').value  = e.nombre;
  document.getElementById('ej-cat').value     = e.categoria || 'Calentamiento';
  document.getElementById('ej-dur').value     = e.duracion  || '15 min';
  document.getElementById('ej-mat').value     = e.material  || '';
  document.getElementById('ej-desc').value    = e.descripcion || '';
  document.getElementById('ej-video').value   = e.video_url  || '';
  fillTipoSelect(e.tipo || '');
  fillNivelSelect(e.nivel || '');
  openSheet('sh-ej');
}

async function guardar() {
  const nombre = document.getElementById('ej-nombre').value.trim();
  if (!nombre) { toast('Escribe el nombre','warn'); return; }
  const nivel = document.getElementById('ej-nivel').value;
  const tipo  = document.getElementById('ej-tipo').value;
  const ej = {
    id:          document.getElementById('ej-id').value || undefined,
    nombre,
    categoria:   document.getElementById('ej-cat').value,
    tipo:        tipo === '__nuevo__' ? '' : tipo,
    nivel:       nivel === '__nuevo__' ? null : (nivel || null),
    duracion:    document.getElementById('ej-dur').value,
    material:    document.getElementById('ej-mat').value.trim(),
    descripcion: document.getElementById('ej-desc').value.trim(),
    video_url:   document.getElementById('ej-video').value.trim() || null,
    activo:      true,
  };
  try {
    await saveEjercicio(ej);
    closeSheet('sh-ej');
    toast('Ejercicio guardado','ok');
    await cargar();
  } catch(e) { toast('Error al guardar','err'); console.error(e); }
}

async function noUsar(id) {
  try { await saveEjercicio({ id, activo: false }); toast('Desactivado','warn'); await cargar(); }
  catch(e) { toast('Error','err'); }
}

function confirmarEliminar(id, nombre) {
  document.getElementById('confirm-texto').textContent = `¿Eliminar "${nombre}"?`;
  document.getElementById('confirm-overlay').classList.add('open');
  document.getElementById('confirm-ok').onclick = async () => {
    document.getElementById('confirm-overlay').classList.remove('open');
    try { await deleteEjercicio(id); toast('Eliminado','ok'); await cargar(); }
    catch(e) { toast('Error','err'); }
  };
}

async function cargar() {
  showLoading('lista-ejercicios');
  _ejercicios = await getEjercicios();
  filtrar();
}

async function init() {
  renderNav('ejercicios');
  await initStore();
  renderHeader({ titulo:'Escuela de Pádel', subtitulo:'Ejercicios', icono:'icons/ejercicios.png', botonDerecho:null });

  // Cargar config
  const cfg = await getConfigMultiple(['niveles','tipos']);
  if (cfg.niveles && cfg.niveles.length) _cfgNiveles = cfg.niveles;
  if (cfg.tipos   && cfg.tipos.length)   _cfgTipos   = cfg.tipos;
  fillFiltroNivel();

  await cargar();
}
init();
</script>
</body>
</html>
