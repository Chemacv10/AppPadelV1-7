<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Pistas — Escuela de Pádel</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .semana-card{background:var(--card);border-radius:14px;margin-bottom:8px;border:1.5px solid var(--borde);overflow:hidden;cursor:pointer;transition:all .15s}
    .semana-card:hover{border-color:#93c5fd;box-shadow:0 2px 10px rgba(37,99,235,.08)}
    .semana-main{padding:12px 14px;display:flex;align-items:center;gap:12px}
    .semana-ico{width:46px;height:46px;background:linear-gradient(135deg,#eff6ff,#dbeafe);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .semana-ico img{width:32px;height:32px;object-fit:contain}
    .semana-rango{font-size:14px;font-weight:900;color:var(--texto)}
    .semana-meta{font-size:11px;color:var(--sutil);font-weight:600;margin-top:2px}
    .semana-preview{padding:0 14px 12px;display:flex;gap:5px;flex-wrap:wrap}
    .prev-pista{background:#f8fafc;border:1px solid var(--borde);border-radius:8px;padding:4px 9px;font-size:10px;font-weight:800;color:#475569;display:flex;align-items:center;gap:5px}
    .prev-dot{width:7px;height:7px;border-radius:50%;background:var(--azul)}
    .periodo-tabs{display:flex;gap:6px;margin-bottom:12px}
    .ptab{flex:1;background:var(--card);border:2px solid var(--borde);border-radius:10px;padding:7px 4px;text-align:center;font-size:11px;font-weight:800;color:var(--sutil);cursor:pointer;text-transform:uppercase;letter-spacing:.4px;transition:all .15s}
    .ptab.active{background:#eff6ff;border-color:var(--azul);color:var(--azul)}
  </style>
</head>
<body>
<div class="page">
  <div id="header-container"></div>
  <nav id="nav-container"></nav>

  <main class="content">
    <div class="periodo-tabs">
      <div class="ptab active" onclick="sf(this,'actual')">Actual</div>
      <div class="ptab" onclick="sf(this,'pasadas')">Pasadas</div>
      <div class="ptab" onclick="sf(this,'todas')">Todas</div>
    </div>

    <div class="sec">
      <img src="icons/pistas.png">
      <div class="sec-title">Pistas</div>
      <div class="sec-count" id="contador">—</div>
    </div>

    <div id="lista-semanas"><div class="loading"><div class="spinner"></div></div></div>
  </main>

  <button class="fab" onclick="openSheet('sh-semana')">+</button>

  <div class="overlay" id="sh-semana">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Nueva semana</div>
      <div class="fgrp">
        <div class="flbl">Fecha inicio (lunes)</div>
        <input class="finp" id="se-fecha" type="date">
      </div>
      <div class="fgrp">
        <div class="flbl">Número de pistas</div>
        <select class="fsel" id="se-pistas">
          <option value="1">1 pista</option>
          <option value="2">2 pistas</option>
          <option value="3" selected>3 pistas</option>
          <option value="4">4 pistas</option>
          <option value="5">5 pistas</option>
          <option value="6">6 pistas</option>
        </select>
      </div>
      <div class="sheet-btns">
        <button class="sbtn" onclick="closeSheet('sh-semana')">Cancelar</button>
        <button class="sbtn prim" onclick="crearSemana()">✓ Crear semana</button>
      </div>
    </div>
  </div>

  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <div class="confirm-titulo">¿Eliminar semana?</div>
      <div class="confirm-texto">Se eliminarán todos los bloques de esta semana.</div>
      <div class="confirm-btns">
        <button class="cbtn" onclick="document.getElementById('confirm-overlay').classList.remove('open')">Cancelar</button>
        <button class="cbtn danger" id="confirm-ok">Eliminar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script>
let _semanas=[];let _filtro='actual';
const PISTA_COLORS=['#2563eb','#16a34a','#f59e0b','#e05a5a','#7c3aed','#0891b2'];

function sf(btn,filtro){
  btn.closest('.periodo-tabs').querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');_filtro=filtro;filtrar();
}

function formatRango(inicio){
  if(!inicio)return'—';
  const d=new Date(inicio+'T00:00:00');
  const fin=new Date(d);fin.setDate(fin.getDate()+6);
  const m=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return`${d.getDate()} ${m[d.getMonth()]} – ${fin.getDate()} ${m[fin.getMonth()]} ${fin.getFullYear()}`;
}

function esActual(s){
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const ini=new Date(s.fecha_inicio+'T00:00:00');
  const fin=new Date(ini);fin.setDate(ini.getDate()+6);
  return hoy>=ini&&hoy<=fin;
}
function esPasada(s){
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const fin=new Date(s.fecha_inicio+'T00:00:00');fin.setDate(fin.getDate()+6);
  return fin<hoy;
}

function filtrar(){
  let lista=_semanas;
  if(_filtro==='actual')lista=_semanas.filter(s=>!esPasada(s));
  else if(_filtro==='pasadas')lista=_semanas.filter(s=>esPasada(s));
  renderLista(lista);
}

function renderLista(semanas){
  document.getElementById('contador').textContent=semanas.length;
  const el=document.getElementById('lista-semanas');
  if(!semanas.length){showEmpty('lista-semanas','Sin semanas\nUsa el botón + para crear una');return}
  el.innerHTML=semanas.map(s=>{
    const bloques=s.bloques_pista||[];
    const np=s.num_pistas||3;
    const actual=esActual(s);
    const previews=Array.from({length:np},(_,i)=>{
      const n=bloques.filter(b=>b.pista===`Pista ${i+1}`).length;
      const color=PISTA_COLORS[i]||'#64748b';
      return`<div class="prev-pista"><div class="prev-dot" style="background:${color}"></div>P${i+1} <span style="color:${color};font-weight:900">${n}</span></div>`;
    }).join('');
    return`
    <div class="semana-card ${actual?'':''}">
      <div class="semana-main" onclick="window.location.href='pistas-interior.html?id=${s.id}'">
        <div class="semana-ico"><img src="icons/pistas.png"></div>
        <div style="flex:1">
          <div class="semana-rango">${formatRango(s.fecha_inicio)}${actual?' 📍':''}</div>
          <div class="semana-meta">${np} pistas · ${bloques.length} bloques</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="abtn dang" style="padding:6px 8px;font-size:12px" onclick="event.stopPropagation();eliminarSemana('${s.id}')">🗑</button>
          <div style="font-size:14px;color:var(--sutil)">›</div>
        </div>
      </div>
      <div class="semana-preview">${previews}</div>
    </div>`;
  }).join('');
}

function proximoLunes(){
  const d=new Date();const dia=d.getDay();
  const diff=dia===0?1:(8-dia)%7||7;
  d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10);
}

async function crearSemana(){
  const fecha=document.getElementById('se-fecha').value;
  if(!fecha){toast('Selecciona la fecha','warn');return}
  const semana={fecha_inicio:fecha,num_pistas:parseInt(document.getElementById('se-pistas').value)};
  try{
    const s=await saveSemana(semana);
    closeSheet('sh-semana');toast('Semana creada','ok');
    window.location.href=`pistas-interior.html?id=${s.id}`;
  }catch(e){toast('Error al crear','err');console.error(e)}
}

function eliminarSemana(id){
  document.getElementById('confirm-overlay').classList.add('open');
  document.getElementById('confirm-ok').onclick=async()=>{
    document.getElementById('confirm-overlay').classList.remove('open');
    try{
      await _sb.from('bloques_pista').delete().eq('semana_id',id);
      await _sb.from('semanas_pista').delete().eq('id',id);
      toast('Semana eliminada','ok');await cargar();
    }catch(e){toast('Error','err')}
  };
}

async function cargar(){
  showLoading('lista-semanas');
  _semanas=await getSemanasPista();filtrar();
}

async function init(){
  renderNav('pistas');
  document.getElementById('se-fecha').value=proximoLunes();
  await initStore();
  renderHeader({titulo:'Escuela de Pádel',subtitulo:'Pistas',icono:'icons/pistas.png',botonDerecho:null});
  await cargar();
}
init();
</script>
</body>
</html>
