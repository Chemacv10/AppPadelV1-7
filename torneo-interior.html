<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Torneo — Escuela de Pádel</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .torneo-hero{background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:13px;padding:13px 15px;margin-bottom:10px;color:#fff}
    .th-name{font-size:17px;font-weight:900}.th-info{font-size:10px;opacity:.85;font-weight:600;margin-top:2px}
    .th-badge{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:800;margin-top:5px}
    .jornada-nav{display:flex;align-items:center;gap:7px;margin-bottom:10px}
    .jnav-btn{width:34px;height:34px;background:#fff;border:1.5px solid var(--borde);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;font-weight:900;color:var(--texto)}
    .jnav-sel{flex:1;background:#fff;border:1.5px solid var(--borde);border-radius:8px;padding:7px 11px;font-family:Nunito,sans-serif;font-size:12px;font-weight:800;color:var(--texto);appearance:none;text-align:center}
    .pista-block{background:#fff;border-radius:12px;padding:11px;margin-bottom:9px;border:1.5px solid var(--borde)}
    .pista-title{font-size:10px;font-weight:900;color:var(--verde);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
    .partido{padding:9px 0;border-bottom:1px solid #f0f4f8}
    .partido:last-of-type{border-bottom:none}
    .par-row{display:flex;align-items:center;gap:5px;margin-bottom:6px}
    .par-names{flex:1;text-align:center}
    .par-pair{font-size:11px;font-weight:800;color:var(--texto);line-height:1.4}
    .vs{background:#f1f5f9;border-radius:5px;padding:2px 5px;font-size:9px;font-weight:900;color:var(--sub);flex-shrink:0}
    .res-box{display:flex;align-items:center;gap:5px;justify-content:center;margin:5px 0}
    .res-input{width:52px;height:42px;border:2px solid var(--borde);border-radius:9px;text-align:center;font-family:Nunito,sans-serif;font-size:20px;font-weight:900;color:var(--texto);background:#f8fafc;outline:none}
    .res-input:focus{border-color:var(--azul)}
    .res-input.ok{background:#e8f5e9;border-color:var(--verde);color:var(--verde)}
    .res-dash{font-size:16px;font-weight:900;color:var(--sutil)}
    .btn-val{width:100%;padding:8px;background:var(--azul);color:#fff;border:none;border-radius:8px;font-family:Nunito,sans-serif;font-size:11px;font-weight:800;cursor:pointer;margin-top:2px}
    .btn-reset{width:100%;padding:8px;background:#f1f5f9;color:var(--sub);border:1.5px solid var(--borde);border-radius:8px;font-family:Nunito,sans-serif;font-size:11px;font-weight:800;cursor:pointer;margin-top:2px;display:none}
    .torneo-actions{display:flex;gap:6px;margin:8px 0}
    .btn-siguiente{flex:1;padding:9px;background:#f0fdf4;border:1.5px solid #86efac;border-radius:9px;font-family:Nunito,sans-serif;font-size:11px;font-weight:800;color:var(--verde);cursor:pointer;display:none}
    .btn-fin{flex:1;padding:9px;background:#eff6ff;border:1.5px solid #93c5fd;border-radius:9px;font-family:Nunito,sans-serif;font-size:11px;font-weight:800;color:var(--azul);cursor:pointer}
    .btn-del{width:38px;padding:9px;background:#fee2e2;border:1.5px solid #fca5a5;border-radius:9px;font-size:11px;cursor:pointer}
    .clas-table{width:100%;border-collapse:collapse;font-size:11px}
    .clas-table th{background:#f8fafc;padding:5px 7px;font-weight:800;color:var(--sutil);font-size:9px;text-transform:uppercase;text-align:center;border-bottom:1px solid var(--borde)}

    .clas-table td:nth-child(2){text-align:left;font-weight:800}

// ── Helpers clasificación ─────────────────────
function clasificacion(partidos, participantes, esRobin) {
  const pts = {};
  const rolMap = {};
  participantes.forEach(p => {
    rolMap[p.nombre] = p.rol || 'jugador';
    pts[p.nombre] = { pj:0, pg:0, pts:0, rol:p.rol||'jugador' };
  });
  partidos.filter(p=>p.resultado_a!=null).forEach(p => {
    const ra=+p.resultado_a, rb=+p.resultado_b;
    if (esRobin) {
      // Round Robin: puntos por pareja
      const a=p.pareja_a, b=p.pareja_b;
      if (!pts[a]) pts[a]={pj:0,pg:0,pts:0,rol:'jugador'};
      if (!pts[b]) pts[b]={pj:0,pg:0,pts:0,rol:'jugador'};
      pts[a].pj++; pts[b].pj++;
      pts[a].pts+=ra; pts[b].pts+=rb;
      if (ra>rb) pts[a].pg++; else if (rb>ra) pts[b].pg++;
    } else {
      // Americano / Mexicano / Escalera: puntos individuales
      const jugA = p.pareja_a.split('/').map(n=>n.trim()).filter(Boolean);
      const jugB = p.pareja_b.split('/').map(n=>n.trim()).filter(Boolean);
      [...jugA,...jugB].forEach(n => { if (!pts[n]) pts[n]={pj:0,pg:0,pts:0,rol:rolMap[n]||'jugador'}; });
      jugA.forEach(n => { pts[n].pj++; pts[n].pts+=ra; if(ra>rb) pts[n].pg++; });
      jugB.forEach(n => { pts[n].pj++; pts[n].pts+=rb; if(rb>ra) pts[n].pg++; });
    }
  });
  return Object.entries(pts)
    .map(([n,v])=>({nombre:n,...v}))
    .sort((a,b)=>b.pts-a.pts||b.pg-a.pg);
}

function renderClasificacion(partidos, participantes) {
  const esRobin = _torneo && _torneo.tipo === 'Round Robin';
  // Solo partidos de jornadas <= jornada actual (puntos acumulados hasta aquí)
  const partidosHasta = partidos.filter(p => p.jornada <= _jornada);
  const cls = clasificacion(partidosHasta, participantes, esRobin);
  if (!cls.length) return '<div class="empty-state">Sin partidos validados aún</div>';
  const medals=['🥇','🥈','🥉'];
  const tieneRol = participantes.some(p=>p.rol&&p.rol!=='jugador');
  return `<table class="clas-table">
    <tr><th>#</th><th>Jugador</th><th>PJ</th><th>PG</th><th>Pts</th></tr>
    ${cls.map((r,i)=>`<tr>
      <td>${medals[i]||i+1}</td>
      <td>${r.nombre}${tieneRol?`<span class="rol-badge ${r.rol==='estrella'?'rol-estrella':'rol-promesa'}">${r.rol==='estrella'?'⭐':'🌱'}</span>`:''}</td>
      <td>${r.pj}</td><td>${r.pg}</td>
      <td style="color:var(--azul);font-weight:900">${r.pts}</td>
    </tr>`).join('')}
  </table>`;
}

// ── Render partido ────────────────────────────
function renderPartido(p) {
  const validado = p.resultado_a != null;
  const idA=`ra-${p.id}`, idB=`rb-${p.id}`;
  return `<div class="partido">
    <div class="par-row">
      <div class="par-names"><div class="par-pair">${p.pareja_a}</div></div>
      <div class="vs">VS</div>
      <div class="par-names"><div class="par-pair">${p.pareja_b}</div></div>
    </div>
    <div class="res-box">
      <input class="res-input ${validado?'ok':''}" id="${idA}" value="${validado?p.resultado_a:0}"
        ${validado?'readonly':''} onfocus="if(!this.readOnly&&this.value=='0')this.value=''" onblur="if(this.value==='')this.value='0'">
      <span class="res-dash">—</span>
      <input class="res-input ${validado?'ok':''}" id="${idB}" value="${validado?p.resultado_b:0}"
        ${validado?'readonly':''} onfocus="if(!this.readOnly&&this.value=='0')this.value=''" onblur="if(this.value==='')this.value='0'">
    </div>
    <button class="btn-val" id="vb-${p.id}" style="display:${validado?'none':'block'}" onclick="validar('${p.id}','${idA}','${idB}')">✅ Validar resultado</button>
    <button class="btn-reset" id="rb-${p.id}" style="display:${validado?'block':'none'}" onclick="resetPartido('${p.id}','${idA}','${idB}')">↺ Reiniciar</button>
  </div>`;
}

// ── Agrupar partidos ──────────────────────────
function agruparPorJornada(partidos) {
  const map = {};
  partidos.forEach(p => {
    if (!map[p.jornada]) map[p.jornada]={};
    if (!map[p.jornada][p.pista]) map[p.jornada][p.pista]=[];
    map[p.jornada][p.pista].push(p);
  });
  return map;
}

// ── renderMain ────────────────────────────────
function renderMain() {
  const tipo = _torneo.tipo;
  const partidos = _torneo.partidos||[];
  const participantes = _torneo.participantes||[];
  const jMap = agruparPorJornada(partidos);
  const nJornadas = partidos.length ? Math.max(...Object.keys(jMap).map(Number)) : 0;

  // Para Mexicano y Escalera: mostrar botón generar nueva jornada
  const esGenerativo = tipo==='Mexicano'||tipo==='Escalera';
  const esAmericano = tipo==='Americano'||tipo==='Round Robin';

  const jOpts = nJornadas
    ? Array.from({length:nJornadas},(_,i)=>`<option value="${i+1}" ${_jornada===i+1?'selected':''}>Jornada ${i+1}</option>`).join('')
    : '<option value="1">Jornada 1</option>';

  const pistas = jMap[_jornada]||{};
  const pistasHTML = Object.entries(pistas).sort(([a],[b])=>a.localeCompare(b)).map(([pista,ps])=>`
    <div class="pista-block">
      <div class="pista-title">🟢 ${pista}</div>
      ${ps.map(renderPartido).join('')}
    </div>`).join('') || (nJornadas ? '<div class="empty-state">Sin partidos en esta jornada</div>' : '<div class="empty-state">Aún no se han generado partidos</div>');

  const finalizado = _torneo.estado==='finalizado';
  const btnSig = esGenerativo && !finalizado
    ? `<button class="btn-siguiente" id="btn-sig" style="display:block" onclick="generarSiguienteJornada()">➕ Nueva jornada</button>`
    : '';

  document.getElementById('main').innerHTML = `
    <div class="torneo-hero">
      <div class="th-name">${_torneo.nombre}</div>
      <div class="th-info">${participantes.length} jugadores · ${tipo}${nJornadas?' · '+nJornadas+' jornada'+(nJornadas>1?'s':''):''}</div>
      <span class="th-badge">${finalizado?'🏁 Finalizado':'🟢 En curso'}</span>
    </div>
    ${nJornadas>1||esAmericano ? `<div class="jornada-nav">
      <button class="jnav-btn" onclick="cambiarJornada(${_jornada-1})">‹</button>
      <select class="jnav-sel" onchange="cambiarJornada(+this.value)">${jOpts}</select>
      <button class="jnav-btn" onclick="cambiarJornada(${_jornada+1})">›</button>
    </div>` : ''}
    ${pistasHTML}
    <div class="torneo-actions">
      ${btnSig}
      ${!finalizado?`<button class="btn-fin" onclick="finalizarTorneo()">🏁 Finalizar</button>`:''}
      <button class="btn-del" onclick="confirmarEliminar()">🗑</button>
    </div>
    <div style="font-size:13px;font-weight:900;color:var(--texto);margin:6px 0 4px">Clasificación</div>
    ${renderClasificacion(partidos, participantes)}`;
}

function cambiarJornada(j) {
  const partidos = _torneo.partidos||[];
  const jMap = agruparPorJornada(partidos);
  const nJ = partidos.length ? Math.max(...Object.keys(jMap).map(Number)) : 1;
  if (j<1||j>nJ) return;
  _jornada=j; renderMain();
}

// ── Generar jornada inicial (Americano) ───────
async function generarJornadaAmericano() {
  const n = _torneo.num_jugadores;
  const tabla = AMERICANO[n];
  if (!tabla) { toast(`No hay tabla para ${n} jugadores`,'warn'); return; }
  const parts = _torneo.participantes||[];
  if (parts.length !== n) { toast(`Hay ${parts.length} participantes pero el torneo es de ${n}`,'warn'); return; }

  const partidos = [];
  tabla.forEach((jornada, ji) => {
    jornada.forEach((cuarteto, pi) => {
      const [i0,i1,i2,i3] = cuarteto;
      partidos.push({
        torneo_id: torneoId,
        jornada: ji+1,
        pista: `Pista ${pi+1}`,
        pareja_a: `${parts[i0].nombre} / ${parts[i1].nombre}`,
        pareja_b: `${parts[i2].nombre} / ${parts[i3].nombre}`,
        resultado_a: null, resultado_b: null,
      });
    });
  });

  try {
    const { error } = await _sb.from('partidos').insert(partidos);
    if (error) throw error;
    _torneo = await getTorneo(torneoId);
    _jornada = 1;
    renderMain();
    toast('Partidos generados','ok');
  } catch(e) { toast('Error al generar','err'); console.error(e); }
}

// ── Generar jornada Mexicano ──────────────────
async function generarSiguienteJornada() {
  const tipo = _torneo.tipo;
  if (tipo==='Mexicano') await generarJornadaMexicano();
  else if (tipo==='Escalera') await generarJornadaEscalera();
}

async function generarJornadaMexicano() {
  const partidos = _torneo.partidos||[];
  const parts = _torneo.participantes||[];
  const n = parts.length;
  const nPistas = n/4;
  const jMap = agruparPorJornada(partidos);
  const nJ = partidos.length ? Math.max(...Object.keys(jMap).map(Number)) : 0;
  const nuevaJ = nJ+1;

  // Si es jornada 1: asignación aleatoria
  let orden;
  if (nJ===0) {
    orden = [...parts].sort(()=>Math.random()-.5);
  } else {
    // Clasificar y redistribuir por pistas
    const esRobin = _torneo && _torneo.tipo === 'Round Robin';
    const cls = clasificacion(partidos, parts, esRobin);
    orden = cls.map(c=>parts.find(p=>p.nombre===c.nombre)).filter(Boolean);
  }

  // Cada grupo de 4 juega americano de 4 (3 partidos: j1+j2 vs j3+j4, j1+j3 vs j2+j4, j1+j4 vs j2+j3)
  const nuevosPartidos = [];
  for (let p=0; p<nPistas; p++) {
    const grupo = orden.slice(p*4,(p+1)*4);
    if (grupo.length<4) continue;
    const [j1,j2,j3,j4] = grupo;
    const pistaNombre = `Pista ${p+1}`;
    [[j1,j2,j3,j4],[j1,j3,j2,j4],[j1,j4,j2,j3]].forEach(([a,b,c,d])=>{
      nuevosPartidos.push({
        torneo_id:torneoId, jornada:nuevaJ, pista:pistaNombre,
        pareja_a:`${a.nombre} / ${b.nombre}`, pareja_b:`${c.nombre} / ${d.nombre}`,
        resultado_a:null, resultado_b:null,
      });
    });
  }

  try {
    await _sb.from('partidos').insert(nuevosPartidos);
    _torneo = await getTorneo(torneoId);
    _jornada = nuevaJ;
    renderMain();
    toast(`Jornada ${nuevaJ} generada`,'ok');
  } catch(e) { toast('Error','err'); console.error(e); }
}

async function generarJornadaEscalera() {
  const partidos = _torneo.partidos||[];
  const parts = _torneo.participantes||[];
  const estrellas = parts.filter(p=>p.rol==='estrella');
  const promesas  = parts.filter(p=>p.rol==='promesa');
  const nPistas = estrellas.length/2; // 2 estrellas+2 promesas por pista
  const jMap = agruparPorJornada(partidos);
  const nJ = partidos.length ? Math.max(...Object.keys(jMap).map(Number)) : 0;
  const nuevaJ = nJ+1;

  // Determinar qué jugadores van a cada pista
  let pistasAsignadas; // [[e1,e2,p1,p2], ...]
  if (nJ===0) {
    // Jornada 1: al azar, manteniendo estrella+promesa por pareja
    const eAl = [...estrellas].sort(()=>Math.random()-.5);
    const pAl = [...promesas].sort(()=>Math.random()-.5);
    pistasAsignadas = Array.from({length:nPistas},(_,i)=>[eAl[i*2],eAl[i*2+1],pAl[i*2],pAl[i*2+1]]);
  } else {
    // Leer última jornada, determinar ganadores/perdedores por pista
    const ultimaJornada = jMap[nJ];
    const nuevasPistas = new Array(nPistas);

    // Para cada pista de la última jornada, calcular ganadores/perdedores
    const resultado = {}; // nombre → {ganó: bool, pistaActual: num}
    Object.entries(ultimaJornada).forEach(([pistaNom, ps]) => {
      const pistaNum = parseInt(pistaNom.replace(/\D/g,''))-1;
      ps.forEach(p => {
        if (p.resultado_a==null) return;
        const ra=+p.resultado_a, rb=+p.resultado_b;
        // Extraer 4 jugadores
        const [a1,a2] = p.pareja_a.split(' / ');
        const [b1,b2] = p.pareja_b.split(' / ');
        const ganadores = ra>rb ? [a1,a2] : [b1,b2];
        const perdedores= ra>rb ? [b1,b2] : [a1,a2];
        ganadores.forEach(n=>{resultado[n]={gano:true,pista:pistaNum}});
        perdedores.forEach(n=>{resultado[n]={gano:false,pista:pistaNum}});
      });
    });

    // Calcular nueva pista para cada jugador (sube/baja/queda)
    const newPistaIdx = {}; // nombre → nueva pista idx (0=top)
    Object.entries(resultado).forEach(([nombre,r])=>{
      let np = r.pista;
      if (r.gano && np>0) np--;
      else if (!r.gano && np<nPistas-1) np++;
      newPistaIdx[nombre]=np;
    });

    // Agrupar por nueva pista
    const grupos = Array.from({length:nPistas},()=>({estrellas:[],promesas:[]}));
    parts.forEach(p=>{
      const np = newPistaIdx[p.nombre]??Math.floor(Math.random()*nPistas);
      if (p.rol==='estrella') grupos[np].estrellas.push(p);
      else grupos[np].promesas.push(p);
    });

    // Asegurarse de que cada pista tiene 2 estrellas y 2 promesas (redistribuir si sobran/faltan)
    pistasAsignadas = grupos.map(g=>([...g.estrellas.slice(0,2),...g.promesas.slice(0,2)]));
    // Si alguna pista no tiene 4, usar asignación aleatoria como fallback
    if (pistasAsignadas.some(p=>p.length<4)) {
      const eAl=[...estrellas].sort(()=>Math.random()-.5);
      const pAl=[...promesas].sort(()=>Math.random()-.5);
      pistasAsignadas=Array.from({length:nPistas},(_,i)=>[eAl[i*2],eAl[i*2+1],pAl[i*2],pAl[i*2+1]]);
    }
  }

  // Generar partidos: en cada pista, los 2 estrellas intercambian compañero cada jornada
  // J1: E1+P1 vs E2+P2 | J2: E1+P2 vs E2+P1 (se alternan)
  const alterna = (nuevaJ%2===1);
  const nuevosPartidos = [];
  pistasAsignadas.forEach((grupo,i)=>{
    if (grupo.length<4) return;
    const [e1,e2,p1,p2] = grupo;
    const pistaNom = `Pista ${i+1}`;
    const [pA_a, pA_b, pB_a, pB_b] = alterna
      ? [e1,p1,e2,p2]
      : [e1,p2,e2,p1];
    nuevosPartidos.push({
      torneo_id:torneoId, jornada:nuevaJ, pista:pistaNom,
      pareja_a:`${pA_a.nombre} / ${pA_b.nombre}`,
      pareja_b:`${pB_a.nombre} / ${pB_b.nombre}`,
      resultado_a:null, resultado_b:null,
    });
  });

  try {
    await _sb.from('partidos').insert(nuevosPartidos);
    _torneo = await getTorneo(torneoId);
    _jornada = nuevaJ;
    renderMain();
    toast(`Jornada ${nuevaJ} generada`,'ok');
  } catch(e) { toast('Error','err'); console.error(e); }
}

// ── Validar / Resetear ────────────────────────
async function validar(id,idA,idB) {
  const ra=parseInt(document.getElementById(idA).value)||0;
  const rb=parseInt(document.getElementById(idB).value)||0;
  try {
    await savePartido({id,resultado_a:ra,resultado_b:rb});
    const p=_torneo.partidos.find(x=>x.id===id);
    if(p){p.resultado_a=ra;p.resultado_b=rb;}
    renderMain(); toast('Resultado guardado','ok');
  } catch(e){toast('Error al guardar','err');}
}

async function resetPartido(id,idA,idB) {
  try {
    await savePartido({id,resultado_a:null,resultado_b:null});
    const p=_torneo.partidos.find(x=>x.id===id);
    if(p){p.resultado_a=null;p.resultado_b=null;}
    renderMain();
  } catch(e){toast('Error','err');}
}

async function finalizarTorneo() {
  try {
    await saveTorneo({id:torneoId,estado:'finalizado'});
    _torneo.estado='finalizado'; renderMain(); toast('Torneo finalizado','ok');
  } catch(e){toast('Error','err');}
}

function confirmarEliminar() {
  document.getElementById('confirm-titulo').textContent='¿Eliminar torneo?';
  document.getElementById('confirm-texto').textContent='Se eliminarán todos los partidos y participantes.';
  document.getElementById('confirm-overlay').classList.add('open');
  document.getElementById('confirm-ok').onclick = async () => {
    await _sb.from('partidos').delete().eq('torneo_id',torneoId);
    await _sb.from('participantes').delete().eq('torneo_id',torneoId);
    await _sb.from('torneos').delete().eq('id',torneoId);
    window.location.href='torneos.html';
  };
}

// ── Init ──────────────────────────────────────
async function init() {
  if (!torneoId) { window.location.href='torneos.html'; return; }
  await initStore();
  _torneo = await getTorneo(torneoId);

  renderHeader({
    titulo: _torneo.nombre,
    subtitulo: `${_torneo.num_jugadores||'?'} jugadores · ${_torneo.tipo}`,
    icono: `icons/${({Americano:'americano',Escalera:'escalera',Mexicano:'mexicano','Round Robin':'robin'}[_torneo.tipo])||'torneos'}.png`,
    botonDerecho:'back', onBack:'torneos.html',
  });

  // Si Americano/Robin y no hay partidos → generar automáticamente
  if (((_torneo.tipo==='Americano')||(_torneo.tipo==='Round Robin')) && (!_torneo.partidos||!_torneo.partidos.length)) {
    await generarJornadaAmericano();
  } else {
    const partidos=_torneo.partidos||[];
    if (partidos.length) {
      const jMap=agruparPorJornada(partidos);
      _jornada=Math.max(...Object.keys(jMap).map(Number));
    }
    renderMain();
  }
}
init();
</script>
